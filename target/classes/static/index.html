<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VeeGoFuel</title>

    <!-- Google Font (modern look) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

    <!-- HEADER -->
    <header class="topbar">
        <div class="brand">
            <h1>VeeGoFuel</h1>
            <p>Fuel that Comes to You...</p>
        </div>

        <!-- LOGO -->
        <img src="/images/logo.png" alt="Logo" class="logo">
    </header>

    <!-- MAIN -->
    <main class="container">

        <!-- AUTH SECTION -->
        <section id="authSection" class="card">
            <h2>Register</h2>
            <form id="registerForm" class="grid-form">
                <input type="text" id="regName" placeholder="Name" required />
                <input type="email" id="regEmail" placeholder="Email" required />
                <input type="password" id="regPassword" placeholder="Password" required />
                <input type="text" id="regPhone" placeholder="Phone Number" required />
                <select id="regRole" required>
                    <option value="">Select Role</option>
                    <option value="BUYER">Buyer</option>
                    <option value="SELLER">Seller</option>
                </select>
                <button type="submit">Register</button>
            </form>

            <h2>Login</h2>
            <form id="loginForm" class="grid-form">
                <input type="email" id="loginEmail" placeholder="Email" required />
                <input type="password" id="loginPassword" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
        </section>

        <!-- APP SECTION -->
        <section id="appSection" class="hidden">

            <div class="user-bar">
                <div>
                    <strong id="welcomeText"></strong>
                    <span id="roleText"></span>
                </div>
                <button id="logoutBtn" class="secondary">Logout</button>
            </div>

            <!-- SELLER -->
            <section id="sellerSection" class="card hidden">
                <h2>Seller Panel</h2>
                <form id="listingForm" class="grid-form">
                    <input type="text" id="stationName" placeholder="Station Name" required />
                    <select id="fuelType" required>
                        <option value="">Select Fuel Type</option>
                        <option value="Petrol">Petrol</option>
                        <option value="Diesel">Diesel</option>
                    </select>
                    <input type="number" id="availableLitres" placeholder="Available Litres" required />
                    <input type="number" id="pricePerLitre" placeholder="Price Per Litre" required />
                    <input type="number" id="stationLat" placeholder="Latitude" step="any" required />
                    <input type="number" id="stationLng" placeholder="Longitude" step="any" required />
                    <input type="text" id="stationPhone" placeholder="Phone" required />
                    <button type="submit">Add Listing</button>
                </form>

                <h3>Your Listings</h3>
                <div id="sellerListings"></div>

                <h3>Your Orders</h3>
                <div id="sellerOrders"></div>
            </section>

            <!-- BUYER -->
            <section id="buyerSection" class="card hidden">
                <h2>Buyer Panel</h2>

                <div class="grid-form">
                    <button id="useLocationBtn" type="button">Use My Location</button>
                    <input type="number" id="buyerLat" placeholder="Latitude" step="any" />
                    <input type="number" id="buyerLng" placeholder="Longitude" step="any" />
                </div>

                <h3>Fuel Listings</h3>
                <div id="buyerListings"></div>

                <h3>Cart</h3>
                <div id="cartBox" class="cart-box">Cart is empty</div>

                <h3>Checkout</h3>
                <form id="checkoutForm" class="grid-form">
                    <input type="number" id="orderLitres" placeholder="Litres Needed" step="any" required />
                    <select id="paymentMethod" required>
                        <option value="">Select UPI</option>
                        <option value="GPay">GPay</option>
                        <option value="PhonePe">PhonePe</option>
                        <option value="Paytm">Paytm</option>
                    </select>
                    <button type="submit">Place Order</button>
                </form>

                <h3>Your Orders</h3>
                <div id="buyerOrders"></div>
            </section>

            <!-- DRIVER -->
            <section id="driverSection" class="card hidden">
                <h2>Delivery Panel</h2>
                <button id="refreshDriverOrders">Refresh Orders</button>
                <div id="driverOrders"></div>
            </section>

        </section>

    </main>

    <script src="/js/app.js"></script>
</body>
</html>
